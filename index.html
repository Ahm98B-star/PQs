        :root {
            /* Theme Variables - Dark (Default) */
            --bg-color: #020617;
            --bg-gradient: radial-gradient(circle at top right, #1e1b4b, #020617);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-bg-hover: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.1);
            --modal-bg: #0f172a;
            
            /* Category Colors */
            --color-deep: 263, 84%, 68%;
            --color-pendulum: 161, 84%, 39%;
            --color-romantic: 341, 82%, 58%;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Light Theme Overrides */
        body.light-theme {
            --bg-color: #f8fafc;
            --bg-gradient: radial-gradient(circle at top right, #e2e8f0, #f8fafc);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-bg-hover: rgba(255, 255, 255, 0.95);
            --border-glass: rgba(0, 0, 0, 0.1);
            --modal-bg: #ffffff;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
            background: var(--bg-gradient);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #root {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        h1, h2, h3, .logo h1, .cat-label {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 1.75rem;
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            animation: fadeIn 0.8s ease;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, hsl(var(--color-deep)), hsl(var(--color-romantic)));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        .icon-btn:hover { background: var(--card-bg-hover); transform: translateY(-2px); }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: hsl(var(--color-romantic));
            color: white;
            font-size: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 2px solid var(--bg-color);
        }

        /* Question Card */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .question-card {
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
            animation: cardEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .card-placeholder {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Theme Toggle Specific */
        .theme-toggle i {
            transition: transform 0.5s ease;
        }
        .light-theme .theme-toggle i { transform: rotate(180deg); }

        /* Buttons Grid */
        .category-grid {
            display: grid;
            gap: 1.25rem;
        }

        .cat-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            outline: none;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 1.5rem;
            color: var(--text-primary);
        }

        .cat-btn:hover { transform: translateY(-3px); background: var(--card-bg-hover); }

        .cat-info { display: flex; align-items: center; gap: 1.25rem; }

        .cat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .cat-label { font-weight: 700; font-size: 1.1rem; }

        .btn-deep { --accent: var(--color-deep); }
        .btn-pendulum { --accent: var(--color-pendulum); }
        .btn-romantic { --accent: var(--color-romantic); }

        .cat-btn .cat-icon { background: hsla(var(--accent), 0.25); color: hsl(var(--accent)); border: 1px solid hsla(var(--accent), 0.4); }
        .light-theme .cat-btn .cat-icon { background: hsla(var(--accent), 0.15); }

        /* Action Buttons */
        .action-flex {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 1.25rem;
            margin-top: 1.5rem;
            animation: slideUp 0.5s ease;
        }

        .action-btn {
            padding: 1.5rem;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-secondary);
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
        }

        .action-btn i { font-size: 1.8rem; }

        .btn-yes:hover { border-color: hsla(var(--color-pendulum), 0.5); color: hsl(var(--color-pendulum)); background: hsla(var(--color-pendulum), 0.1); }
        .btn-no:hover { border-color: hsla(var(--color-romantic), 0.5); color: hsl(var(--color-romantic)); background: hsla(var(--color-romantic), 0.1); }

        /* Status Banner */
        .status-banner {
            padding: 1.25rem;
            text-align: center;
            border-radius: 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            animation: fadeIn 0.4s ease;
        }
        .status-success { color: hsl(var(--color-pendulum)); background: hsla(var(--color-pendulum), 0.15); border: 1px solid hsla(var(--color-pendulum), 0.2); }
        .status-warn { color: hsl(var(--color-romantic)); background: hsla(var(--color-romantic), 0.15); border: 1px solid hsla(var(--color-romantic), 0.2); }

        /* Drawer & Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            width: 100%;
            max-width: 440px;
            background: var(--modal-bg);
            border: 1px solid var(--border-glass);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-primary);
        }

        .modal-body { padding: 1.5rem; color: var(--text-primary); }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--modal-bg);
            border-top: 1px solid var(--border-glass);
            border-radius: 2.5rem 2.5rem 0 0;
            z-index: 2000;
            padding: 2.5rem;
            transform: translateY(100%);
            transition: var(--transition);
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.3);
        }

        .drawer.active { transform: translateY(0); }

        .drawer-handle {
            width: 50px;
            height: 5px;
            background: var(--border-glass);
            border-radius: 10px;
            margin: -0.5rem auto 1.5rem;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes cardEnter { from { transform: scale(0.92) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes modalPop { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        /* Loader */
        .loader {
            width: 32px;
            height: 32px;
            border: 4px solid hsla(var(--color-deep), 0.2);
            border-top-color: hsl(var(--color-deep));
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Desktop Adaptation */
        @media (min-width: 768px) {
            #root { max-width: 900px; padding: 4rem 2rem; }
            .category-grid { grid-template-cols: 1fr 1fr 1fr; }
            .question-card { min-height: 360px; padding: 4rem; }
            .question-text { font-size: 2.2rem; }
            .logo h1 { font-size: 2rem; }
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding-bottom: 2rem;
            font-weight: 500;
        }

        input.modern-input {
            width: 100%;
            padding: 1.25rem;
            background: var(--card-bg);
            border: 1.5px solid var(--border-glass);
            border-radius: 1.25rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }
        input.modern-input:focus { border-color: hsl(var(--color-deep)); outline: none; }

        .primary-btn {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, hsl(var(--color-deep)), hsl(var(--color-romantic)));
            border-radius: 1.25rem;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            color: white;
            transition: var(--transition);
            box-shadow: 0 10px 20px -5px hsla(var(--color-deep), 0.4);
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px hsla(var(--color-deep), 0.6); }
    </style>
</head>

            const [questions, setQuestions] = useState(() => {
                const saved = localStorage.getItem('questions');
                return saved ? JSON.parse(saved) : INITIAL_QUESTIONS;
            });
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [answeredStatus, setAnsweredStatus] = useState(null);
            const [showPending, setShowPending] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                localStorage.setItem('questions', JSON.stringify(questions));
            }, [questions]);

            useEffect(() => {
                localStorage.setItem('theme', theme);
                document.body.className = theme + '-theme';
            }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            // AI Integration
            const [apiKey, setApiKey] = useState(() => {
                const cipher = localStorage.getItem('gemini_api_key');
                if (!cipher) return '';
                try {
                    const bytes = CryptoJS.AES.decrypt(cipher, "antigravity-secure-salt");
                    return bytes.toString(CryptoJS.enc.Utf8);
                } catch (e) { return ''; }
            });

            const generateQuestions = async (cat) => {
                if (!apiKey) {
                    alert('يرجى إدخال مفتاح الـ API في الإعدادات لتوليد أسئلة جديدة.');
                    setShowSettings(true);
                    return;
                }
                setIsLoading(true);
                try {
                    const prompt = `Generate 5 unique and engaging questions in Arabic for a social game. The category is '${cat}'. 
                    - 'deep' (سؤال عميق): Philosophical, life-changing, emotional.
                    - 'pendulum' (سؤال بندولي): Fun, trivial, silly, daily life choices.
                    - 'romantic' (سؤال رومانسي): Emotional, relationship-focused, romantic.
                    Format the response as a JSON array of strings. Only return the JSON array.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const newTexts = JSON.parse(text.replace(/```json|```/g, '').trim());
                    
                    const newQuestions = newTexts.map(t => ({ id: Math.random(), text: t, category: cat, isAnswered: false, isSkipped: false }));
                    setQuestions(prev => [...prev, ...newQuestions]);
                    return newQuestions[0];
                } catch (error) {
                    console.error('Error:', error);
                    alert('حدث خطأ أثناء جلب الأسئلة.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleCategorySelect = async (cat) => {
                const available = questions.filter(q => q.category === cat && !q.isAnswered && !q.isSkipped);
                if (available.length === 0) {
                    if (confirm('نفدت الأسئلة! هل تريد توليد أسئلة جديدة؟')) {
                        const newQ = await generateQuestions(cat);
                        if (newQ) setCurrentQuestion(newQ);
                    }
                    return;
                }
                const random = available[Math.floor(Math.random() * available.length)];
                setCurrentQuestion({ ...random, animKey: Math.random() });
                setAnsweredStatus(null);
            };

            const handleAction = (status) => {
                if (status === 'answered') {
                    setQuestions(prev => prev.map(q => q.id === currentQuestion.id ? { ...q, isAnswered: true } : q));
                } else if (status === 'skipped') {
                    setQuestions(prev => prev.map(q => q.id === currentQuestion.id ? { ...q, isSkipped: true } : q));
                }
                setAnsweredStatus(status);
            };

            const saveSettings = (newKey) => {
                const encrypted = CryptoJS.AES.encrypt(newKey, "antigravity-secure-salt").toString();
                localStorage.setItem('gemini_api_key', encrypted);
                setApiKey(newKey);
                setShowSettings(false);
            };

            const pendingQuestions = questions.filter(q => q.isSkipped && !q.isAnswered);

            return (
                <>
                    {/* Header */}
                    <header>
                        <div className="logo text-right">
                            <h1>مولد الأسئلة</h1>
                            <p>أعمق، أمرح، وأكثر رومانسية</p>
                        </div>
                        <div className="header-actions">
                            <button className="icon-btn theme-toggle" onClick={toggleTheme}>
                                <Icon name={theme === 'dark' ? 'sun' : 'moon'} className="w-5 h-5" />
                            </button>
                            <button className="icon-btn" onClick={() => setShowPending(true)}>
                                <Icon name="list" className="w-5 h-5" />
                                {pendingQuestions.length > 0 && <span className="badge">{pendingQuestions.length}</span>}
                            </button>
                            <button className="icon-btn" onClick={() => setShowSettings(true)}>
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="main-content">
                        <div key={currentQuestion?.animKey || 'empty'} className="question-card glass">
                            {isLoading ? (
                                <div className="loader"></div>
                            ) : currentQuestion ? (
                                <p className="question-text">{currentQuestion.text}</p>
                            ) : (
                                <p className="card-placeholder">اختر تصنيفاً للبدء باللعب...</p>
                            )}
                        </div>

                        {/* Category Buttons */}
                        <div className="category-grid">
                            <button onClick={() => handleCategorySelect('deep')} disabled={isLoading} className="cat-btn btn-deep">
                                <div className="cat-info">
                                    <div className="cat-icon"><Icon name="brain" /></div>
                                    <span className="cat-label">سؤال عميق</span>
                                </div>
                                <Icon name="chevron-left" style={{opacity: 0.5}} />
                            </button>
                            <button onClick={() => handleCategorySelect('pendulum')} disabled={isLoading} className="cat-btn btn-pendulum">
                                <div className="cat-info">
                                    <div className="cat-icon"><Icon name="shuffle" /></div>
                                    <span className="cat-label">سؤال بندولي</span>
                                </div>
                                <Icon name="chevron-left" style={{opacity: 0.5}} />
                            </button>
                            <button onClick={() => handleCategorySelect('romantic')} disabled={isLoading} className="cat-btn btn-romantic">
                                <div className="cat-info">
                                    <div className="cat-icon"><Icon name="heart" /></div>
                                    <span className="cat-label">سؤال رومانسي</span>
                                </div>
                                <Icon name="chevron-left" style={{opacity: 0.5}} />
                            </button>
                        </div>

                        {/* Actions */}
                        {currentQuestion && !answeredStatus && (
                            <div className="action-flex">
                                <button onClick={() => handleAction('answered')} className="action-btn btn-yes">
                                    <Icon name="check-circle" />
                                    <span>تمت الإجابة</span>
                                </button>
                                <button onClick={() => handleAction('skipped')} className="action-btn btn-no">
                                    <Icon name="x-circle" />
                                    <span>تخطي</span>
                                </button>
                            </div>
                        )}

                        {answeredStatus && (
                            <div className={`status-banner ${answeredStatus === 'answered' ? 'status-success' : 'status-warn'}`}>
                                {answeredStatus === 'answered' ? "رائع! تم تسجيل الإجابة بنجاح." : "تمت إضافة السؤال للقائمة المعلقة."}
                            </div>
                        )}
                    </main>

                    {/* Modals & Drawer */}
                    {showSettings && (
                        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h3 style={{fontWeight: 700}}>الإعدادات Secure Settings</h3>
                                    <button onClick={() => setShowSettings(false)} className="icon-btn" style={{border: 'none', background: 'transparent'}}><Icon name="x" /></button>
                                </div>
                                <div className="modal-body">
                                    <p style={{fontSize: '0.9rem', marginBottom: '0.75rem', fontWeight: 600}}>Gemini API Key (Flash 1.5):</p>
                                    <input 
                                        type="password" 
                                        defaultValue={apiKey} 
                                        id="api-key-inp"
                                        placeholder="Paste your key here..."
                                        className="modern-input"
                                    />
                                    <button className="primary-btn" onClick={() => saveSettings(document.getElementById('api-key-inp').value)}>حفظ الإعدادات</button>
                                    
                                    <div style={{marginTop: '2rem', display: 'flex', gap: '1rem'}}>
                                        <button onClick={() => {if(confirm('إعادة ضبط؟')) {setQuestions(INITIAL_QUESTIONS); setCurrentQuestion(null); setAnsweredStatus(null);}}} style={{flex: 1, padding: '1rem', background: 'rgba(244,63,94,0.1)', borderRadius: '1rem', border: '1px solid rgba(244,63,94,0.2)', color: '#f43f5e', fontWeight: 600, cursor: 'pointer'}}>تهيئة المصنع</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`modal-overlay ${showPending ? '' : 'hidden'}`} style={{display: showPending ? 'flex' : 'none'}} onClick={() => setShowPending(false)}>
                        <div className={`drawer ${showPending ? 'active' : ''}`} onClick={e => e.stopPropagation()}>
                            <div className="drawer-handle"></div>
                            <div className="modal-header" style={{border: 'none', padding: '0 0 2rem 0'}}>
                                <h3 style={{fontWeight: 700, fontSize: '1.4rem'}}>قائمة لم تتم إجابتها</h3>
                                <button className="icon-btn" onClick={() => setShowPending(false)} style={{border: 'none', background: 'transparent'}}><Icon name="x" /></button>
                            </div>
                            <div className="drawer-body" style={{display: 'grid', gap: '1rem'}}>
                                {pendingQuestions.length === 0 ? (
                                    <p style={{textAlign: 'center', color: 'var(--text-secondary)', padding: '3rem'}}>لا توجد أسئلة معلقة حالياً.</p>
                                ) : (
                                    pendingQuestions.map(q => (
                                        <div key={q.id} className="glass" style={{padding: '1.25rem', fontSize: '1rem', fontWeight: 500}}>
                                            {q.text}
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    <footer className="footer">
                        <p>بني بكل فخر بواسطة Antigravity Core</p>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
